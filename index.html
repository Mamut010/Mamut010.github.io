<!DOCTYPE html>
<html lang="en">
    <head>
        <title>App Center</title>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <link rel="shortcut icon" href="./favicon.ico" type="image/x-icon">
        <link rel="icon" href="./favicon.ico" type="image/x-icon">
        <link rel="stylesheet" href="./css/reset.css">
        <link rel="stylesheet" href="./css/hub.css">
    </head>
    <body>
        <div class="hub-container">
            <h1 class="hub-title">App Center</h1>
            <p class="hub-subtitle">Choose an app to get started</p>
            <div class="app-grid">
                <a class="app-card" href="./apps/2048/">
                    <div class="app-card-visual">2048</div>
                    <div class="app-card-info">
                        <div class="app-card-name">2048</div>
                        <div class="app-card-desc">Classic sliding number puzzle game</div>
                    </div>
                </a>
                <a class="app-card" href="./apps/rewarder/">
                    <div class="app-card-visual">🎁</div>
                    <div class="app-card-info">
                        <div class="app-card-name">Reward System</div>
                        <div class="app-card-desc">Gacha rolls with pity system</div>
                    </div>
                </a>
            </div>
        </div>
    </body>
</html>
