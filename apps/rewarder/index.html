<!DOCTYPE html>
<html lang="en">
    <head>
        <title>Reward System</title>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <link rel="stylesheet" href="../../css/reset.css">
        <link rel="stylesheet" href="./css/styles.css">
    </head>
    <body>
        <div class="page-wrapper">

            <header class="app-header">
                <a class="back-link" href="../../">← App Center</a>
                <h1 class="app-title">Reward System</h1>
                <div class="header-spacer"></div>
            </header>

            <div class="app-layout">

                <!-- ===== Config Sidebar ===== -->
                <aside class="config-panel">

                    <section class="config-section">
                        <div class="rewards-editor-header">
                            <h2 class="section-title" style="margin-bottom:0">Rewards</h2>
                            <div class="add-node-buttons">
                                <button id="btn-add-leaf" class="btn-add-node">+ Reward</button>
                                <button id="btn-add-group" class="btn-add-node">+ Group</button>
                            </div>
                        </div>
                        <div id="reward-list">
                            <!-- populated by JS -->
                        </div>
                        <div class="rate-summary">
                            Overall: <span id="total-rate">100.00</span>%
                            <span class="rate-warning-inline" id="rate-warning" style="display:none">⚠ must sum to 100</span>
                        </div>
                    </section>

                    <section class="config-section">
                        <h2 class="section-title">Pity System</h2>
                        <div class="pity-toggle-row">
                            <label class="toggle-label" for="pity-toggle">Hard Pity</label>
                            <label class="toggle-switch">
                                <input type="checkbox" id="pity-toggle" checked>
                                <span class="toggle-slider"></span>
                            </label>
                        </div>
                        <div class="pity-config-row" id="pity-config-row">
                            <label class="pity-label" for="pity-threshold">Threshold</label>
                            <input type="number" id="pity-threshold" class="pity-input"
                                value="90" min="1" max="9999" step="1">
                            <span class="pity-unit">rolls</span>
                        </div>
                        <div class="pity-config-row pity-target-row" id="pity-target-row">
                            <label class="pity-label" for="pity-target">Target</label>
                            <select id="pity-target" class="pity-target-select">
                                <!-- populated by JS -->
                            </select>
                        </div>
                    </section>

                    <section class="config-section">
                        <div class="roll-buttons">
                            <button class="btn btn-roll"       id="btn-roll">Roll ×1</button>
                            <button class="btn btn-roll-multi" id="btn-roll-10">Roll ×10</button>
                            <button class="btn btn-roll-multi" id="btn-roll-100">Roll ×100</button>
                        </div>
                        <button class="btn btn-reset" id="btn-reset">Reset Stats</button>
                    </section>

                </aside>

                <!-- ===== Main Content ===== -->
                <main class="main-content">

                    <!-- Latest Result -->
                    <div class="result-section" id="latest-result">
                        <div class="idle-msg">Roll to get started!</div>
                    </div>

                    <!-- Statistics -->
                    <div class="stats-section">
                        <div class="stats-header">
                            <h2 class="section-title" style="margin-bottom:0">Statistics</h2>
                            <span class="total-badge">Total: <span id="stat-total">0</span> rolls</span>
                        </div>
                        <div id="stats-rows">
                            <!-- populated by JS -->
                        </div>

                        <!-- Pity progress bar -->
                        <div class="pity-progress-section" id="pity-section">
                            <div class="pity-header">
                                <span>Pity: <span id="pity-target-name">—</span></span>
                                <span>
                                    <span id="pity-count">0</span> /
                                    <span id="pity-threshold-display">90</span>
                                </span>
                            </div>
                            <div class="pity-bar-track">
                                <div class="pity-bar" id="pity-bar"></div>
                            </div>
                        </div>
                    </div>

                    <!-- History -->
                    <div class="history-section">
                        <h2 class="section-title">History</h2>
                        <div class="history-log" id="history-log">
                            <div class="history-empty">No rolls yet</div>
                        </div>
                    </div>

                </main>
            </div>
        </div>

        <script src="./js/rewarder.js"></script>
    </body>
</html>
