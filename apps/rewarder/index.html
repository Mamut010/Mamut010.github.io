<!DOCTYPE html>
<html lang="en">
    <head>
        <title>Reward System</title>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <link rel="stylesheet" href="../../css/reset.css">
        <link rel="stylesheet" href="./css/styles.css">
    </head>
    <body>
        <div class="page-wrapper">

            <header class="app-header">
                <a class="back-link" href="../../">← App Center</a>
                <h1 class="app-title">Reward System</h1>
                <div class="header-spacer"></div>
            </header>

            <!-- ===== Tab Bar ===== -->
            <div class="tab-bar" id="tab-bar" role="tablist">
                <button class="tab-btn is-active" data-tab="play"   role="tab" aria-selected="true">Play</button>
                <button class="tab-btn"           data-tab="config" role="tab" aria-selected="false">Config</button>
            </div>

            <!-- ===== Play Tab ===== -->
            <div class="tab-panel" id="tab-play" role="tabpanel">
                <div class="play-layout">

                    <!-- Primary column: wheel + result + roll controls -->
                    <div class="play-primary">

                        <!-- Latest Result -->
                        <div class="result-section" id="latest-result">
                            <!-- Wheel view -->
                            <div id="wheel-view" class="wheel-view">
                                <div class="wheel-wrap">
                                    <canvas id="wheel-canvas" width="500" height="500"></canvas>
                                </div>
                                <div class="wheel-controls">
                                    <div class="wheel-mode-selector" id="wheel-mode-selector" role="group" aria-label="Spin mode">
                                        <button class="btn btn-mode is-active" data-mode="normal">Normal</button>
                                        <button class="btn btn-mode" data-mode="accelerate">Fast</button>
                                        <button class="btn btn-mode" data-mode="skip">Skip</button>
                                    </div>
                                </div>
                            </div>
                            <!-- Card view (result / idle message) -->
                            <div id="card-view" class="card-view">
                                <div class="idle-msg">Roll to get started!</div>
                            </div>
                        </div>

                        <!-- Roll buttons -->
                        <section class="config-section roll-section">
                            <div class="roll-buttons">
                                <button class="btn btn-roll"       id="btn-roll">Roll ×1</button>
                                <button class="btn btn-roll-multi" id="btn-roll-10">Roll ×10</button>
                                <button class="btn btn-roll-multi" id="btn-roll-100">Roll ×100</button>
                            </div>
                            <button class="btn btn-reset" id="btn-reset">Reset Stats</button>
                        </section>

                    </div>

                    <!-- Secondary column: stats + history -->
                    <div class="play-secondary">

                        <!-- Statistics -->
                        <div class="stats-section">
                            <div class="stats-header">
                                <h2 class="section-title" style="margin-bottom:0">Statistics</h2>
                                <span class="total-badge">Total: <span id="stat-total">0</span> rolls</span>
                            </div>
                            <div id="stats-rows">
                                <!-- populated by JS -->
                            </div>
                            <!-- Pity progress bar -->
                            <div class="pity-progress-section" id="pity-section">
                                <div class="pity-header">
                                    <span>Pity: <span id="pity-target-name">—</span></span>
                                    <span>
                                        <span id="pity-count">0</span> /
                                        <span id="pity-threshold-display">90</span>
                                    </span>
                                </div>
                                <div class="pity-bar-track">
                                    <div class="pity-bar" id="pity-bar"></div>
                                </div>
                            </div>
                        </div>

                        <!-- History -->
                        <div class="history-section">
                            <h2 class="section-title">History</h2>
                            <div class="history-log" id="history-log">
                                <div class="history-empty">No rolls yet</div>
                            </div>
                        </div>

                    </div>
                </div>
            </div>

            <!-- ===== Config Tab ===== -->
            <div class="tab-panel is-hidden" id="tab-config" role="tabpanel">
                <div class="config-layout">

                    <!-- Rewards group: profile selector + reward tree -->
                    <details class="config-group" open>
                        <summary class="config-group-header">
                            <span class="config-group-title">Rewards</span>
                            <span class="config-group-chevron">&#x25BE;</span>
                        </summary>
                        <div class="config-group-body">

                            <section class="config-section profile-section">
                                <div class="profile-row">
                                    <select id="profile-select" class="profile-select">
                                        <!-- populated by JS -->
                                    </select>
                                    <button id="btn-new-profile" class="btn-icon" title="New profile">+</button>
                                    <button id="btn-delete-profile" class="btn-icon" title="Delete profile">&#xd7;</button>
                                </div>
                                <div class="profile-name-row">
                                    <label class="profile-name-label" for="profile-name">Name</label>
                                    <input type="text" id="profile-name" class="profile-name-input" placeholder="Profile name">
                                </div>
                            </section>

                            <section class="config-section">
                                <div class="rewards-editor-header">
                                    <h2 class="section-title" style="margin-bottom:0">Rewards</h2>
                                    <div class="add-node-buttons">
                                        <button id="btn-add-leaf" class="btn-add-node">+ Reward</button>
                                        <button id="btn-add-group" class="btn-add-node">+ Group</button>
                                    </div>
                                </div>
                                <div id="reward-list">
                                    <!-- populated by JS -->
                                </div>
                                <div class="rate-summary">
                                    Overall: <span id="total-rate">100.00</span>%
                                    <span class="rate-warning-inline" id="rate-warning" style="display:none">⚠ must sum to 100</span>
                                </div>
                            </section>

                        </div>
                    </details>

                    <!-- Pity group: one section per supported pity type -->
                    <details class="config-group" open>
                        <summary class="config-group-header">
                            <span class="config-group-title">Pity</span>
                            <span class="config-group-chevron">&#x25BE;</span>
                        </summary>
                        <div class="config-group-body">

                            <section class="config-section pity-section">
                                <div class="pity-toggle-row">
                                    <h2 class="section-title" style="margin-bottom:0">Hard Pity</h2>
                                    <label class="toggle-switch">
                                        <input type="checkbox" id="pity-toggle" checked>
                                        <span class="toggle-slider"></span>
                                    </label>
                                </div>
                                <div class="pity-config-row" id="pity-config-row">
                                    <label class="pity-label" for="pity-threshold">Threshold</label>
                                    <input type="number" id="pity-threshold" class="pity-input"
                                        value="90" min="1" max="9999" step="1">
                                    <span class="pity-unit">rolls</span>
                                </div>
                                <div class="pity-config-row pity-target-row" id="pity-target-row">
                                    <label class="pity-label" for="pity-target">Target</label>
                                    <select id="pity-target" class="pity-target-select">
                                        <!-- populated by JS -->
                                    </select>
                                </div>
                            </section>

                        </div>
                    </details>

                </div>
            </div>
        </div>

        <script src="./js/rewarder.js"></script>
    </body>
</html>
